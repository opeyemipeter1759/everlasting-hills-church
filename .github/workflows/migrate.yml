name: Database Migration

on:
  push:
    branches: [master]
    paths:
      - 'everlasting-hills-church/prisma/schema.prisma'

jobs:
  migrate:
    name: Push schema to Supabase
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: everlasting-hills-church

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: everlasting-hills-church/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema changes
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
